short_bio: >-
  <p>
    I am currently a researcher on the Pre-training Team at <a href="https://hunyuan.tencent.com/research?page=1" target="_blank">Tencent Hunyuan</a>. My current work focuses on improving training stability of LLMs and exploring efficient Pre-training. 
  </p>
  <p>
    I received both my B.S. and M.S. degrees from Beihang University, under the supervision of Prof. <a href='https://shi.buaa.edu.cn/buaa_95012/en/index.htm' target='_blank'>Qinghong Yang</a>.
    My research interests lie in the interpretability of llms and efficient Transformer training.
    Outside of work, I share my life with a cat named <a href='/assets/images/caiyuan.png' target='_blank'>Caiyuan</a>.
  </p>

